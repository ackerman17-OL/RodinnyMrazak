<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mrazák</title>

<style>

body {
    font-family: Arial, sans-serif;
    background:#f2f6fb;
    margin:0;
    padding:15px;
}

h1 {
    text-align:center;
    font-size:28px;
}


/* výběr mrazáku */

#mrazaky {
    display:flex;
    gap:10px;
    width:100%;
}

.mrazak-btn {
    flex:1;
    min-width:0;
    background:white;
    box-shadow:0 2px 8px #ccc;
    font-size:22px;
    font-weight:bold;
    padding:18px 5px;
    border:0;
    border-radius:12px;
    text-align:center;
}

.active {

    background:#2d7ff9;
    color:white;

}


/* karta */

.karta {

    background:white;
    border-radius:14px;
    padding:15px;
    margin-top:15px;
    box-shadow:0 2px 8px #ddd;

}



/* šuplík */

.suplik {

    margin-top:15px;
    background:#eaf2ff;
    padding:18px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

}



/* obsah šuplíku */

.obsah-suplik {

    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    margin-bottom:15px;

}



/* jednotlivé položky */

.polozka {

    width:120px;
    min-height:80px;
    background:#f5f5f5;
    border-radius:10px;
    padding:10px;
    font-size:15px;
    overflow:hidden;

}


.polozka b {

    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    font-size:20px;

}



/* mazání */

.smazat {

    background:#ef4444;
    color:white;
    border:0;
    border-radius:6px;
    font-size:12px;
    padding:5px 8px;
    margin-top:8px;

}



/* přidat */

.plus {

    width:100%;
    margin-top:20px;
    background:#22c55e;
    color:white;
    font-size:20px;
    padding:15px;

    border:0;
    border-radius:12px;

}

.mnozstvi {

    background:#2d7ff9;
    color:white;
    border:0;
    border-radius:6px;
    font-size:18px;
    width:35px;
    height:30px;
    margin-top:8px;
    margin-right:5px;

}


</style>

</head>


<body>


<h1>❄️ Mrazák</h1>


<div id="mrazaky"></div>


<div id="obsah"></div>


<button class="plus" onclick="pridat()">
➕ Přidat položku
</button>


<script>


let data = JSON.parse(localStorage.getItem("mrazak")) || [

{
nazev:"Janovská",
supliky:[
[],
[],
[]
]
},

{
nazev:"Žloukovice",
supliky:[
[],
[],
[],
[]
],
malymrazak:true
},

{
nazev:"Žinkovská",
supliky:[
[],
[],
[]
]
}

];


let aktualni = 0;


let otevreneSupliky = [
true,
true,
true,
true
];



function uloz(){

localStorage.setItem(
"mrazak",
JSON.stringify(data)
);

}

function zmenMnozstvi(s,i,zmena){


let polozka=data[aktualni]
.supliky[s][i];


polozka.pocet=parseInt(polozka.pocet)+zmena;


if(polozka.pocet<=0){

if(confirm("Počet je 0 ks. Chcete položku smazat?")){

data[aktualni]
.supliky[s]
.splice(i,1);

}
else{

polozka.pocet=1;

}

}


uloz();

vykresli();


}

function vykresliMrazaky(){


let html="";


data.forEach((m,index)=>{


html+=`

<button class="mrazak-btn ${index===aktualni ? "active":""}"
onclick="vyberMrazak(${index})">

${m.nazev}

</button>

`;


});


document.getElementById("mrazaky").innerHTML=html;


}





function vyberMrazak(id){

aktualni=id;


let otevreneSupliky = [
true,
true,
true,
true
];

vykresliMrazaky();

vykresli();

}





function vykresli(){


let m=data[aktualni];


let html="";


html+=`

<div class="karta">

`;



m.supliky.forEach((suplik,index)=>{


let nazevSupliku="Šuplík "+(index+1);


if(m.nazev==="Žloukovice" && index===3){

nazevSupliku="Malý";

}



html+=`

<div class="suplik"
onclick="prepniSuplik(${index})">


${otevreneSupliky[index] ? "▼" : "▶"}

📦 ${nazevSupliku}


</div>


`;
if(otevreneSupliky[index]){


html+=`

<div class="obsah-suplik">

`;



if(suplik.length===0){


html+=`

<div class="polozka">
Prázdný
</div>

`;

}



[...suplik]
.sort((a,b)=>a.nazev.localeCompare(b.nazev,"cs"))
.forEach((p,i)=>{


html+=`

<div class="polozka">


<b>${p.nazev}</b>

${p.baleni}

<br>

${p.pocet} ks

<br>

<button class="mnozstvi"
onclick="zmenMnozstvi(${index},${i},-1)">
−
</button>

<button class="mnozstvi"
onclick="zmenMnozstvi(${index},${i},1)">
+
</button>


<button class="smazat"
onclick="smaz(${index},${i})">

Smazat

</button>


</div>


`;

});


html+=`

</div>

`;

}


});



html+=`

</div>

`;



document.getElementById("obsah").innerHTML=html;


}





function prepniSuplik(index){

otevreneSupliky[index]=
!otevreneSupliky[index];

vykresli();

}





function pridat(){


let suplik=prompt(
"Číslo šuplíku 1-4"
);



suplik=parseInt(suplik)-1;



if(isNaN(suplik) || suplik<0 || suplik>=data[aktualni].supliky.length){

alert("Zadej správné číslo šuplíku");

return;

}




let nazev=prompt(
"Název"
);



if(!nazev)return;



let baleni=prompt(
"Váha (nepovinné)"
);



let pocet=prompt(
"Počet kusů"
);



data[aktualni]
.supliky[suplik]
.push({

nazev:nazev,

baleni:baleni || "",

pocet:pocet || 1

});



uloz();

vykresli();


}

function smaz(s,i){


if(!confirm("Opravdu chcete tuto položku smazat?")){
    return;
}


data[aktualni]
.supliky[s]
.splice(i,1);



uloz();

vykresli();


}


vykresliMrazaky();

vykresli();


</script>


</body>
</html>
